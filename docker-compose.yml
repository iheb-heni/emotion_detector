# version: "3.9"
services:
  backend:
    build:
      context: ./back
    container_name: emotion_backend
    ports:
      - "5000:5000"
    volumes:
      - ./back:/app         
    environment:
      - FLASK_ENV=development   
    command: flask run --host=0.0.0.0 --port=5000

  frontend:
    build:
      context: ./front
    container_name: emotion_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./front:/app           
      - /app/node_modules       
    environment:
      - NODE_ENV=development    
    command: npm run dev        
